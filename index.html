<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 과의존 상담 챗봇 · Gemini API 직접 호출</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Black+Han+Sans&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel-2:#1c2330; --line:#2a3340;
    --ink:#e6edf3; --ink-dim:#9aa7b4; --accent:#ffd34e;
    --stable:#3fb950; --caution:#e3b341; --risk:#f78166; --high:#f85149;
    --user-bubble:#243042; --bot-bubble:#1c2330;
    --shadow:0 18px 50px -20px rgba(0,0,0,.8);
    --display:"Black Han Sans",sans-serif; --body:"Gowun Dodum",sans-serif; --mono:"IBM Plex Mono",monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:
      radial-gradient(900px 500px at 85% -8%, rgba(255,211,78,.10), transparent 60%),
      radial-gradient(700px 500px at 5% 110%, rgba(248,129,102,.10), transparent 55%),
      var(--bg);
    color:var(--ink); font-family:var(--body); line-height:1.6; min-height:100vh;
    padding:clamp(14px,2.5vw,40px);
  }
  .wrap{max-width:1120px;margin:0 auto}

  header{
    border:1px solid var(--line); border-radius:22px;
    background:linear-gradient(160deg,var(--panel),var(--panel-2));
    padding:clamp(20px,2.6vw,34px); position:relative; overflow:hidden; box-shadow:var(--shadow);
  }
  header::after{content:"";position:absolute;inset:0;
    background-image:repeating-linear-gradient(135deg,rgba(255,255,255,.018) 0 2px,transparent 2px 9px);pointer-events:none}
  .tag{display:inline-block;font-family:var(--mono);font-size:12px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--accent);border:1px solid rgba(255,211,78,.4);border-radius:999px;padding:5px 14px;margin-bottom:16px}
  h1{font-family:var(--display);font-weight:400;font-size:clamp(26px,4.4vw,48px);line-height:1.06;letter-spacing:-.01em}
  h1 .hl{color:var(--accent)}
  header p{color:var(--ink-dim);margin-top:12px;max-width:62ch;font-size:clamp(13px,1.4vw,15px)}

  .grid{display:grid;grid-template-columns:1.1fr .9fr;gap:20px;margin-top:20px}
  @media(max-width:900px){.grid{grid-template-columns:1fr}}
  .card{border:1px solid var(--line);border-radius:20px;background:var(--panel);box-shadow:var(--shadow);overflow:hidden}
  .card-head{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:9px}
  .card-head h2{font-family:var(--display);font-weight:400;font-size:19px}
  .card-head .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 4px rgba(255,211,78,.16)}
  .card-head .status{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--ink-dim)}

  /* ---- Chat ---- */
  #chat{height:440px;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:12px}
  #chat::-webkit-scrollbar{width:8px}
  #chat::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}
  .msg{max-width:82%;padding:11px 15px;border-radius:15px;font-size:14.5px;white-space:pre-wrap;animation:rise .25s ease}
  @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .msg.bot{align-self:flex-start;background:var(--bot-bubble);border:1px solid var(--line);border-bottom-left-radius:5px}
  .msg.user{align-self:flex-end;background:var(--user-bubble);border-bottom-right-radius:5px}
  .msg.sys{align-self:center;font-family:var(--mono);font-size:11.5px;color:var(--ink-dim);background:transparent;text-align:center;max-width:100%}
  .typing{align-self:flex-start;display:flex;gap:5px;padding:14px 16px;background:var(--bot-bubble);border:1px solid var(--line);border-radius:15px;border-bottom-left-radius:5px}
  .typing i{width:7px;height:7px;border-radius:50%;background:var(--ink-dim);animation:blink 1.1s infinite}
  .typing i:nth-child(2){animation-delay:.2s}.typing i:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,60%,100%{opacity:.25}30%{opacity:1}}

  .input-bar{display:flex;gap:10px;padding:14px;border-top:1px solid var(--line);background:var(--panel-2)}
  .input-bar input{flex:1;background:var(--bg);border:1px solid var(--line);border-radius:12px;color:var(--ink);
    font-family:var(--body);font-size:14.5px;padding:11px 14px;outline:none}
  .input-bar input:focus{border-color:var(--accent)}
  .input-bar button{font-family:var(--body);font-weight:700;font-size:14px;padding:0 20px;border-radius:12px;border:none;
    background:var(--accent);color:#1a1300;cursor:pointer;transition:.15s}
  .input-bar button:hover{filter:brightness(1.08)}
  .input-bar button:disabled{opacity:.4;cursor:not-allowed}

  /* ---- Side panel ---- */
  .side{padding:18px;display:flex;flex-direction:column;gap:16px}
  .progress-list{display:flex;flex-direction:column;gap:8px}
  .pitem{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--ink-dim)}
  .pitem .pdot{width:18px;height:18px;border-radius:50%;border:2px solid var(--line);flex:none;
    display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;transition:.2s}
  .pitem.done .pdot{background:var(--accent);border-color:var(--accent);color:#1a1300}
  .pitem.done{color:var(--ink)}
  .pitem .pscore{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--accent)}

  .result-banner{border-radius:16px;padding:18px;text-align:center;border:1px solid var(--line);background:var(--panel-2);display:none}
  .result-banner.show{display:block;animation:rise .35s ease}
  .result-banner .score{font-family:var(--mono);font-size:12px;color:var(--ink-dim)}
  .result-banner .stage{font-family:var(--display);font-size:38px;line-height:1;margin:5px 0}
  .illus{display:flex;justify-content:center;margin:4px 0 10px}
  .illus svg{width:150px;height:auto;filter:drop-shadow(0 8px 18px rgba(0,0,0,.45))}
  .prob{margin-bottom:7px;text-align:left}
  .prob-head{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px}
  .prob-head .pn{color:var(--ink-dim)}.prob-head .pv{font-family:var(--mono);color:var(--ink)}
  .prob-bar{height:6px;border-radius:999px;background:var(--line);overflow:hidden}
  .prob-bar i{display:block;height:100%;width:0;transition:width .6s cubic-bezier(.2,.7,.2,1)}
  .interp{text-align:left;font-size:13px;margin-top:12px;border-top:1px dashed var(--line);padding-top:12px}
  .interp h3{font-family:var(--display);font-weight:400;font-size:15px;margin:10px 0 5px}
  .interp ul{list-style:none}.interp li{position:relative;padding-left:16px;margin-bottom:5px;color:var(--ink-dim)}
  .interp li::before{content:"›";position:absolute;left:2px;color:var(--accent);font-family:var(--mono)}
  .interp .guide{background:rgba(255,211,78,.06);border:1px solid rgba(255,211,78,.2);border-radius:10px;padding:11px 13px;color:var(--ink)}
  .key-bar{display:flex;align-items:center;gap:10px;padding:13px 14px;border-top:1px solid var(--line);background:var(--panel-2)}
  .key-label{font-family:var(--mono);font-size:12px;color:var(--ink-dim);white-space:nowrap}
  .key-bar input{flex:1;background:var(--bg);border:1px solid rgba(255,211,78,.35);border-radius:12px;
    color:var(--ink);font-family:var(--mono);font-size:13px;padding:10px 13px;outline:none;letter-spacing:.04em}
  .key-bar input:focus{border-color:var(--accent)}
  .key-bar button{font-family:var(--body);font-weight:700;font-size:14px;padding:0 22px;height:40px;
    border-radius:12px;border:none;background:var(--accent);color:#1a1300;cursor:pointer;transition:.15s;white-space:nowrap}
  .key-bar button:hover{filter:brightness(1.08)}
  .restart{margin-top:10px;width:100%;font-family:var(--body);font-size:13px;padding:10px;border-radius:11px;
    border:1px solid var(--line);background:transparent;color:var(--ink-dim);cursor:pointer}
  .restart:hover{color:var(--ink);border-color:var(--ink-dim)}

  .note{margin-top:20px;border:1px solid var(--line);border-radius:18px;background:var(--panel);padding:18px 22px;color:var(--ink-dim);font-size:12.5px}
  .note b{color:var(--accent);font-family:var(--display);font-weight:400}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <span class="tag">AI Over-dependence · Counseling Chat</span>
    <h1>AI 과의존 <span class="hl">상담 챗봇</span></h1>
    <p>슬라이더 대신 대화로 진행합니다. 챗봇이 AI 사용 습관을 자연스럽게 물어보고, 답변에서 8개 변수를 1~10점으로 추출해 위험 단계를 예측합니다.</p>
  </header>

  <div class="grid">
    <!-- CHAT -->
    <section class="card">
      <div class="card-head">
        <span class="dot"></span><h2>상담 대화</h2>
        <span class="status" id="status">대기 중</span>
      </div>
      <div id="chat"></div>
      <div class="key-bar" id="keyBar">
        <span class="key-label">🔑 Gemini API</span>
        <input id="apiKeyInput" type="text" value="HTML 내부 GEMINI_API_KEY 상수를 사용합니다" autocomplete="off" disabled>
        <button id="startBtn" onclick="startChat()">시작</button>
      </div>
      <div class="input-bar" id="inputBar" style="display:none">
        <input id="userInput" type="text" placeholder="답변을 입력하세요…" autocomplete="off">
        <button id="sendBtn" onclick="send()">전송</button>
      </div>
    </section>

    <!-- SIDE: progress + result -->
    <section class="card">
      <div class="card-head"><span class="dot"></span><h2>분석 현황</h2></div>
      <div class="side">
        <div class="progress-list" id="progress"></div>
        <div class="result-banner" id="result"></div>
      </div>
    </section>
  </div>

  <div class="note">
    <b>모델 설명</b><br>
    챗봇이 추출한 8개 점수로 규칙 기반 위험 점수를 계산해 단계를 판정합니다(원본 파이썬 로직 동일). 실제 심리 진단이 아니라 <b>교육용 탐색 결과</b>입니다.
    응답은 Gemini API로 처리됩니다.
  </div>
</div>

<script>
/* ========= 원본 파이썬 로직 ========= */
const FEATURES = {
  Q1_ai_usage:"AI 사용량",
  Q2_ai_self_efficacy:"AI 자기효능감",
  Q4_ai_verification_trust:"AI 답변 검증 습관",
  Q5_learning_efficiency_attitude:"학습 효율 향상 체감",
  Q6_future_intention:"향후 AI 사용 증가 의도",
  Q7_relationship_effect:"인간관계 긍정 영향",
  Q8_academic_dependency:"AI 없을 때 학업 어려움",
  Q9_academic_satisfaction:"학업 만족도",
};
const KEYS = Object.keys(FEATURES);
const RISK_ORDER = ["안정","주의","위험","고위험"];
const STAGE_COLOR = {"안정":"#3fb950","주의":"#e3b341","위험":"#f78166","고위험":"#f85149"};

function ruleScore(v){
  return 0.25*v.Q1_ai_usage + 0.25*v.Q8_academic_dependency
       + 0.15*(11-v.Q4_ai_verification_trust) + 0.15*v.Q6_future_intention
       + 0.10*(11-v.Q7_relationship_effect) + 0.10*(11-v.Q9_academic_satisfaction);
}
function scoreToStage(s){ return s<4.0?"안정":s<5.8?"주의":s<7.3?"위험":"고위험"; }
function stageProbabilities(score){
  const centers={"안정":2.5,"주의":4.9,"위험":6.55,"고위험":8.5}, sigma=1.25;
  let raw={},sum=0;
  for(const st of RISK_ORDER){const d=score-centers[st];raw[st]=Math.exp(-(d*d)/(2*sigma*sigma));sum+=raw[st];}
  const out={};for(const st of RISK_ORDER)out[st]=raw[st]/sum;return out;
}
function interpretation(v,stage){
  const r=[];
  if(v.Q1_ai_usage>=8)r.push("AI 사용량이 높은 편입니다.");else if(v.Q1_ai_usage<=4)r.push("AI 사용량은 낮은 편입니다.");
  if(v.Q8_academic_dependency>=8)r.push("AI가 없으면 학업 수행이 어렵다고 느끼는 정도가 높습니다.");else if(v.Q8_academic_dependency<=4)r.push("AI 의존도는 낮은 편입니다.");
  if(v.Q4_ai_verification_trust<=4)r.push("AI 답변 검증 습관이 낮아 오류 수용 위험이 있습니다.");else if(v.Q4_ai_verification_trust>=8)r.push("AI 답변을 검증하는 습관이 비교적 강합니다.");
  if(v.Q9_academic_satisfaction<=4)r.push("학업 만족도가 낮아 AI 사용이 보상적 의존으로 이어질 수 있습니다.");
  if(v.Q7_relationship_effect<=4)r.push("AI 사용이 인간관계에 주는 긍정 효과를 낮게 보고 있습니다.");
  if(r.length===0)r.push("특정 위험 요인이 한쪽으로 강하게 치우치지는 않았습니다.");
  const guide={
    "안정":"현재 입력값 기준으로는 과의존 위험이 낮습니다. 다만 AI 답변 검증 습관은 유지하는 것이 좋습니다.",
    "주의":"AI 사용이 학습에 도움이 되지만, 의존도가 올라갈 가능성이 있습니다. 중요한 과제에서는 반드시 직접 검증 과정을 두는 것이 좋습니다.",
    "위험":"AI 사용량과 학업 의존도가 높은 편입니다. 풀이 과정 직접 작성, 출처 확인, AI 없이 해결하는 연습 시간이 필요합니다.",
    "고위험":"AI 과의존 가능성이 높게 예측되었습니다. 학습 계획에서 AI 사용 시간을 제한하고, 스스로 문제를 해결하는 단계를 반드시 포함하는 것이 좋습니다.",
  };
  return {reasons:r,guide:guide[stage]};
}
function stageSVG(stage){
  const c=STAGE_COLOR[stage];
  const faces={
    "안정":'<path d="M78 122 q42 30 84 0" fill="none" stroke="#0d1117" stroke-width="7" stroke-linecap="round"/>',
    "주의":'<line x1="80" y1="124" x2="160" y2="124" stroke="#0d1117" stroke-width="7" stroke-linecap="round"/>',
    "위험":'<path d="M78 130 q42 -26 84 0" fill="none" stroke="#0d1117" stroke-width="7" stroke-linecap="round"/>',
    "고위험":'<path d="M76 134 q44 -30 88 0" fill="none" stroke="#0d1117" stroke-width="8" stroke-linecap="round"/>',
  };
  return `<svg viewBox="0 0 240 175" xmlns="http://www.w3.org/2000/svg">
    <circle cx="120" cy="95" r="74" fill="${c}" opacity="0.16"/>
    <circle cx="120" cy="95" r="56" fill="${c}" opacity="0.30"/>
    <circle cx="120" cy="95" r="42" fill="${c}"/>
    <circle cx="104" cy="86" r="6" fill="#0d1117"/><circle cx="136" cy="86" r="6" fill="#0d1117"/>
    ${faces[stage]}</svg>`;
}

/* ========= 대화 상태 ========= */
let scores = {};          // 추출된 점수 누적
let history = [];          // Gemini API 대화 기록
let finished = false;

const chatEl = document.getElementById("chat");
const inputEl = document.getElementById("userInput");
const sendBtn = document.getElementById("sendBtn");
const statusEl = document.getElementById("status");

/* 진행 현황 패널 초기화 */
function renderProgress(){
  const box = document.getElementById("progress");
  box.innerHTML = KEYS.map(k=>{
    const done = scores[k] != null;
    return `<div class="pitem ${done?'done':''}">
      <span class="pdot">${done?'✓':''}</span>
      <span>${FEATURES[k]}</span>
      ${done?`<span class="pscore">${scores[k]}</span>`:''}
    </div>`;
  }).join("");
  statusEl.textContent = finished ? "분석 완료" : `${Object.keys(scores).length} / 8 파악`;
}

function addMsg(text, role){
  const d=document.createElement("div");
  d.className="msg "+role; d.textContent=text;
  chatEl.appendChild(d); chatEl.scrollTop=chatEl.scrollHeight;
}
function showTyping(){
  const t=document.createElement("div");t.className="typing";t.id="typing";
  t.innerHTML="<i></i><i></i><i></i>";chatEl.appendChild(t);chatEl.scrollTop=chatEl.scrollHeight;
}
function hideTyping(){const t=document.getElementById("typing");if(t)t.remove();}

/* ========= Gemini API 직접 호출 설정 =========
   아래 GEMINI_API_KEY 문자열 안에 본인의 Gemini API 키를 직접 붙여 넣으세요.
   예: const GEMINI_API_KEY = "AIza...";
   주의: 브라우저용 HTML에 키를 넣으면 개발자도구/소스 보기에서 노출됩니다.
*/
const GEMINI_API_KEY = "AIzaSyCVga0GNfoGXMBHQRTYlYOrmHOOhqgIKjs";
const GEMINI_MODEL = "gemini-3.5-flash";
const INITIAL_START_MESSAGE = "상담을 시작해 주세요. 먼저 따뜻하게 인사하고, AI 사용 습관을 알아보기 위한 첫 질문을 하나 해 주세요.";

const SYSTEM_PROMPT = `당신은 청소년·대학생의 AI 사용 습관을 알아보는 따뜻한 상담사입니다.
목표는 아래 8개 항목을 자연스러운 대화로 파악해 각각 1~10점으로 환산하는 것입니다.
한 번에 한두 항목씩, 부담 없는 일상 질문으로 물어보세요. 점수를 사용자에게 직접 묻지 마세요(예: "10점 만점에 몇 점?" 금지). 사용자의 서술에서 당신이 점수를 추론합니다.

[파악할 항목 / 키]
- Q1_ai_usage: AI 사용량 (얼마나 자주, 많이 쓰는가)
- Q2_ai_self_efficacy: AI 자기효능감 (AI를 잘 다룬다고 느끼는 정도)
- Q4_ai_verification_trust: AI 답변 검증 습관 (답을 그대로 믿지 않고 확인하는 정도)
- Q5_learning_efficiency_attitude: 학습 효율 향상 체감 (AI로 공부가 잘 된다고 느끼는 정도)
- Q6_future_intention: 향후 AI 사용 증가 의도 (앞으로 더 많이 쓸 생각)
- Q7_relationship_effect: 인간관계 긍정 영향 (AI 사용이 인간관계에 주는 긍정 효과)
- Q8_academic_dependency: AI 없을 때 학업 어려움 (AI 없으면 공부가 힘든 정도)
- Q9_academic_satisfaction: 학업 만족도 (현재 학업에 대한 만족)

[점수 기준] 1=전혀/매우 낮음, 5=보통, 10=매우 그러함/매우 높음.
사용자 답변이 모호하면 추가로 한 번 더 가볍게 물어보세요.

[출력 형식 — 매 응답마다 반드시 이 구조]
먼저 사용자에게 보여줄 대화 메시지를 자연스럽게 쓰고,
그 다음 줄에 아래 형식의 JSON 블록을 반드시 포함하세요(사용자에게는 숨겨집니다):

\`\`\`json
{"scores": {"Q1_ai_usage": 8}, "done": false}
\`\`\`

- scores에는 이번 답변으로 새로 파악했거나 갱신된 항목만 넣으세요. 아직 모르면 비워 둡니다.
- 8개 항목을 모두 파악했다고 판단되면 done을 true로 설정하고, 마지막 대화 메시지로 "분석을 마쳤어요. 결과를 확인해보세요." 같은 마무리 인사를 하세요.
첫 메시지는 따뜻한 인사와 함께 첫 질문으로 시작하세요.`;

function getApiKey(){
  return GEMINI_API_KEY.trim();
}

function buildGeminiContents(){
  const cleaned = history
    .filter(m => m && (m.role === "user" || m.role === "model") && Array.isArray(m.parts))
    .map(m => ({
      role:m.role,
      parts:m.parts
        .filter(p => p && typeof p.text === "string" && p.text.trim())
        .map(p => ({text:p.text}))
    }))
    .filter(m => m.parts.length > 0);

  // Gemini generateContent는 contents[]가 필수입니다.
  // 시작 버튼을 눌렀는데 아직 사용자의 채팅 입력이 없을 때도,
  // 내부 시작 메시지를 user content로 넣어 첫 응답을 받을 수 있게 합니다.
  if(cleaned.length === 0){
    return [{role:"user", parts:[{text:INITIAL_START_MESSAGE}]}];
  }

  // 이전 저장 과정에서 첫 항목이 model로 시작하면 Gemini가 대화 맥락을 불안정하게 처리할 수 있어 보정합니다.
  if(cleaned[0].role !== "user"){
    return [{role:"user", parts:[{text:INITIAL_START_MESSAGE}]}, ...cleaned];
  }

  return cleaned;
}

async function callGemini(){
  const apiKey = getApiKey();
  if(!apiKey || apiKey === "YOUR_GEMINI_API_KEY_HERE" || apiKey.includes("여기에")){
    throw new Error("HTML 파일의 GEMINI_API_KEY 상수에 실제 Gemini API 키를 넣어주세요.");
  }

  const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent`,{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-goog-api-key": apiKey
    },
    body:JSON.stringify({
      systemInstruction:{
        parts:[{text:SYSTEM_PROMPT}]
      },
      contents:buildGeminiContents(),
      generationConfig:{
        temperature:0.7,
        maxOutputTokens:1000
      }
    })
  });

  if(!res.ok){
    const err = await res.json().catch(()=>({}));
    const msg = err?.error?.message || `HTTP ${res.status}`;
    throw new Error(msg);
  }

  const data = await res.json();
  const parts = data?.candidates?.[0]?.content?.parts || [];
  const text = parts.map(p=>p.text || "").join("\n").trim();
  if(!text){
    const reason = data?.candidates?.[0]?.finishReason;
    throw new Error(reason ? `Gemini 응답이 비어 있습니다. finishReason: ${reason}` : "Gemini 응답이 비어 있습니다.");
  }
  return text;
}

/* Gemini 응답에서 대화문 + JSON 분리 */
function parseReply(raw){
  let scoresUpdate={}, done=false, message=raw;
  const m = raw.match(/```json\s*([\s\S]*?)```/);
  if(m){
    try{
      const obj=JSON.parse(m[1].trim());
      if(obj.scores) scoresUpdate=obj.scores;
      if(obj.done) done=true;
    }catch(e){}
    message = raw.replace(/```json[\s\S]*?```/,"").trim();
  }
  return {message, scoresUpdate, done};
}

async function botTurn(){
  showTyping(); sendBtn.disabled=true; inputEl.disabled=true;
  try{
    const raw = await callGemini();
    history.push({role:"model",parts:[{text:raw}]});
    const {message, scoresUpdate, done} = parseReply(raw);

    // 점수 누적 (1~10 클램프)
    for(const [k,val] of Object.entries(scoresUpdate)){
      if(KEYS.includes(k)){
        const n=Math.max(1,Math.min(10,Math.round(Number(val))));
        if(!isNaN(n)) scores[k]=n;
      }
    }
    hideTyping();
    addMsg(message || "(응답을 받지 못했어요)","bot");
    renderProgress();

    // 모든 항목이 채워졌거나 done이면 결과 표시
    if((done || KEYS.every(k=>scores[k]!=null)) && KEYS.every(k=>scores[k]!=null)){
      finishAndShowResult();
    }
  }catch(err){
    hideTyping();
    addMsg("⚠️ 오류: " + err.message, "sys");
    console.error(err);
  }finally{
    if(!finished){ sendBtn.disabled=false; inputEl.disabled=false; inputEl.focus(); }
  }
}

async function send(){
  const text = inputEl.value.trim();
  if(!text || finished) return;
  addMsg(text,"user");
  history.push({role:"user",parts:[{text:text}]});
  inputEl.value="";
  await botTurn();
}
inputEl.addEventListener("keydown",e=>{if(e.key==="Enter")send();});

/* ========= 결과 표시 ========= */
function finishAndShowResult(){
  finished=true; sendBtn.disabled=true; inputEl.disabled=true;
  inputEl.placeholder="상담이 완료되었습니다.";
  statusEl.textContent="분석 완료";

  const v={}; KEYS.forEach(k=>v[k]=scores[k]);
  const score=ruleScore(v), stage=scoreToStage(score);
  const probs=stageProbabilities(score), color=STAGE_COLOR[stage];
  const {reasons,guide}=interpretation(v,stage);

  const probHTML=RISK_ORDER.map(st=>{
    const p=probs[st]*100;
    return `<div class="prob"><div class="prob-head"><span class="pn">${st}</span><span class="pv">${p.toFixed(1)}%</span></div>
      <div class="prob-bar"><i style="background:${STAGE_COLOR[st]}" data-w="${p}"></i></div></div>`;
  }).join("");

  const el=document.getElementById("result");
  el.innerHTML=`
    <div class="score">규칙 기반 위험 점수 · ${score.toFixed(2)} / 10</div>
    <div class="stage" style="color:${color}">${stage}</div>
    <div class="illus">${stageSVG(stage)}</div>
    ${probHTML}
    <div class="interp">
      <h3>주요 해석</h3><ul>${reasons.map(r=>`<li>${r}</li>`).join("")}</ul>
      <h3>권장 조치</h3><div class="guide">${guide}</div>
    </div>
    <button class="restart" onclick="location.reload()">처음부터 다시 상담</button>`;
  el.style.borderColor=color; el.classList.add("show");
  requestAnimationFrame(()=>el.querySelectorAll(".prob-bar i").forEach(i=>i.style.width=i.dataset.w+"%"));
  addMsg("✅ 8개 항목 분석 완료 — 오른쪽 패널에서 결과를 확인하세요.","sys");
}

/* ========= 시작 ========= */
renderProgress();

function startChat(){
  const key = getApiKey();
  if(!key || key === "YOUR_GEMINI_API_KEY_HERE" || key.includes("여기에")){
    alert("HTML 파일의 GEMINI_API_KEY 상수에 실제 Gemini API 키를 먼저 넣어주세요.");
    return;
  }
  document.getElementById("keyBar").style.display = "none";
  document.getElementById("inputBar").style.display = "flex";
  document.getElementById("startBtn").disabled = true;

  // 첫 호출 때 사용자가 아직 입력한 메시지가 없어도 Gemini의 필수 contents가 비지 않도록 내부 시작 메시지를 넣습니다.
  if(history.length === 0){
    history.push({role:"user", parts:[{text:INITIAL_START_MESSAGE}]});
  }

  botTurn();   // 챗봇이 먼저 인사 + 첫 질문
}
</script>
